name: Lint and Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint

      # Always run Prettier even if ESLint failed, so contributors see every issue at once.
      - name: Run Prettier check
        id: prettier
        if: always()
        run: npm run format:check

      - name: Annotate suggested fixes
        if: failure()
        run: |
          if [ "${{ steps.eslint.outcome }}" = "failure" ]; then
            echo "::error title=ESLint failed::Lint errors detected. Run 'npm run lint:fix' locally to auto-fix, then commit and push."
          fi
          if [ "${{ steps.prettier.outcome }}" = "failure" ]; then
            echo "::error title=Prettier failed::Formatting issues detected. Run 'npm run format' locally to fix, then commit and push."
          fi
